# /views/trial-balance -- per-account net debit/credit, computed live from
# the journal series.
#
# Apply with `pond apply -f view-trial-balance.yaml`. Then query via
# `pond cat /views/trial-balance --format=table` or
# `pond cat /views/trial-balance --sql "SELECT * FROM source WHERE account_code=1100"`.
#
# The journal is a series so this view sees ALL journal versions
# concatenated -- which is the correct semantics here, since each
# transaction adds a new version with new legs.

version: v1
kind: mkdir
metadata:
  path: /views
---
version: v1
kind: mknod
metadata:
  path: /views/trial-balance
spec:
  factory: sql-derived-series
  config:
    patterns:
      source: "series:///data/journal.series"
    query: |
      SELECT
        account_code,
        SUM(debit_cents)  AS debit_cents,
        SUM(credit_cents) AS credit_cents,
        SUM(debit_cents) - SUM(credit_cents) AS net_cents
      FROM source
      GROUP BY account_code
      ORDER BY account_code
