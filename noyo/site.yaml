factory: sitegen

site:
  title: "Noyo Harbor Blue Economy"
  base_url: "/"
  github_url: "https://github.com/jmacd/noyo-blue-econ"

exports:
  - name: "params"
    pattern: "/reduced/single_param/*/*.series"
  - name: "sites"
    pattern: "/reduced/single_site/*/*.series"

routes:
  - name: "home"
    type: static
    slug: ""
    page: "/system/site/index.md"
  - name: "params"
    type: static
    slug: "params"
    page: "/system/site/params.md"
    routes:
      - name: "param-detail"
        type: template
        slug: "$0"
        page: "/system/site/data.md"
        export: "params"
  - name: "sites"
    type: static
    slug: "sites"
    page: "/system/site/sites.md"
    routes:
      - name: "site-detail"
        type: template
        slug: "$0"
        page: "/system/site/data.md"
        export: "sites"

partials:
  sidebar: "/system/site/sidebar.md"

sidebar:
  - label: "Home"
    href: "/"
  - label: "Parameters"
    href: "/params/index.html"
    children:
      - label: "Dissolved Oxygen"
        href: "/params/DO.html"
      - label: "Salinity"
        href: "/params/Salinity.html"
      - label: "Temperature"
        href: "/params/Temperature.html"
      - label: "Tide"
        href: "/params/Tide.html"
  - label: "Sites"
    href: "/sites/index.html"
    children:
      - label: "B-Dock"
        href: "/sites/BDock.html"
      - label: "Field Station"
        href: "/sites/FieldStation.html"
      - label: "Princess Seafood"
        href: "/sites/Princess.html"
      - label: "Silver"
        href: "/sites/Silver.html"

static_assets: []

# Noyo Center for Marine Science theme
# Deep navy + ocean teal palette inspired by noyocenter.org
theme:
  accent: "#0f3460"
  accent-light: "#1a6985"
  accent-wash: "#e8f4f8"
  bg: "#f5f7fa"
  bg-sidebar: "#edf2f7"
  bg-card: "#f7fafc"
  bg-hover: "#e2e8f0"
  border: "#cbd5e0"
  border-light: "#e2e8f0"
  nav-btn: "rgba(26, 105, 133, 0.85)"
  nav-btn-hover: "rgba(26, 105, 133, 0.65)"
  nav-btn-active: "rgba(15, 52, 96, 0.9)"
  nav-sub-btn: "rgba(26, 105, 133, 0.5)"
  nav-sub-btn-hover: "rgba(26, 105, 133, 0.35)"
  nav-sub-btn-active: "rgba(15, 52, 96, 0.85)"
