factory: sitegen

site:
  title: "Caspar Infrastructure"
  base_url: "/"
  github_url: "https://github.com/jmacd/duckpond"

subsites:
  - name: "noyo"
    path: "/sources/noyo"
    config: "/system/etc/90-sitegen"
    base_url: "/noyo/"
  - name: "water"
    path: "/sources/water"
    config: "/etc/site.yaml"
    base_url: "/water/"
  - name: "septic"
    path: "/sources/septic"
    config: "/etc/site.yaml"
    base_url: "/septic/"

routes:
  - name: "home"
    type: static
    slug: ""
    page: "/system/site/index.md"

partials:
  sidebar: "/system/site/sidebar.md"

sidebar:
  - label: "Home"
    href: "/"
  - label: "Noyo Harbor"
    href: "/noyo/"
  - label: "Water System"
    href: "/water/"
  - label: "Septic Station"
    href: "/septic/"

# Combined infrastructure theme -- steel blue
theme:
  accent: "#1a365d"
  accent-light: "#2a4a7f"
  accent-wash: "#ebf4ff"
  bg: "#f7fafc"
  bg-sidebar: "#edf2f7"
  bg-card: "#ffffff"
  bg-hover: "#e2e8f0"
  border: "#cbd5e0"
  border-light: "#e2e8f0"
  nav-btn: "rgba(42, 74, 127, 0.85)"
  nav-btn-hover: "rgba(42, 74, 127, 0.65)"
  nav-btn-active: "rgba(26, 54, 93, 0.9)"
  nav-sub-btn: "rgba(42, 74, 127, 0.5)"
  nav-sub-btn-hover: "rgba(42, 74, 127, 0.35)"
  nav-sub-btn-active: "rgba(26, 54, 93, 0.85)"
