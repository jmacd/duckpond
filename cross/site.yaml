factory: sitegen

site:
  title: "Caspar Infrastructure"
  base_url: "/"
  github_url: "https://github.com/jmacd/duckpond"

exports:
  - name: "septic"
    pattern: "/sources/septic/reduced/*/*/*.series"
  - name: "water"
    pattern: "/sources/water/reduced/*/*/*.series"
  - name: "noyo-params"
    pattern: "/sources/noyo/reduced/single_param/*/*/*.series"
  - name: "noyo-sites"
    pattern: "/sources/noyo/reduced/single_site/*/*/*.series"

routes:
  - name: "home"
    type: static
    slug: ""
    page: "/system/site/index.md"
  - name: "septic"
    type: static
    slug: "septic"
    page: "/system/site/septic.md"
    routes:
      - name: "septic-detail"
        type: template
        slug: "$0"
        page: "/system/site/data.md"
        export: "septic"
  - name: "water"
    type: static
    slug: "water"
    page: "/system/site/water.md"
    routes:
      - name: "water-detail"
        type: template
        slug: "$0"
        page: "/system/site/data.md"
        export: "water"
  - name: "noyo-params"
    type: static
    slug: "noyo/params"
    page: "/system/site/noyo-params.md"
    routes:
      - name: "noyo-param-detail"
        type: template
        slug: "$0"
        page: "/system/site/data.md"
        export: "noyo-params"
  - name: "noyo-sites"
    type: static
    slug: "noyo/sites"
    page: "/system/site/noyo-sites.md"
    routes:
      - name: "noyo-site-detail"
        type: template
        slug: "$0"
        page: "/system/site/data.md"
        export: "noyo-sites"

partials:
  sidebar: "/system/site/sidebar.md"

sidebar:
  - label: "Home"
    href: "/"
  - label: "Septic"
    href: "/septic/index.html"
    children:
      - label: "Pump Amps"
        href: "/septic/pumps.html"
      - label: "Cycle Times"
        href: "/septic/cycle-times.html"
      - label: "Pump Modes"
        href: "/septic/pump-modes.html"
      - label: "Flow Totals"
        href: "/septic/flow-totals.html"
      - label: "Dose Zones"
        href: "/septic/dose-zones.html"
      - label: "BME280"
        href: "/septic/environment.html"
  - label: "Water"
    href: "/water/index.html"
    children:
      - label: "Well Depth"
        href: "/water/well-depth.html"
      - label: "Tank Level"
        href: "/water/tank-level.html"
      - label: "System Pressure"
        href: "/water/system-pressure.html"
      - label: "Chlorine Level"
        href: "/water/chlorine-level.html"
      - label: "pH"
        href: "/water/ph.html"
  - label: "Noyo Parameters"
    href: "/noyo/params/index.html"
    children:
      - label: "Dissolved Oxygen"
        href: "/noyo/params/DO.html"
      - label: "Salinity"
        href: "/noyo/params/Salinity.html"
      - label: "Temperature"
        href: "/noyo/params/Temperature.html"
      - label: "Tide"
        href: "/noyo/params/Tide.html"
  - label: "Noyo Sites"
    href: "/noyo/sites/index.html"
    children:
      - label: "B-Dock"
        href: "/noyo/sites/BDock.html"
      - label: "Field Station"
        href: "/noyo/sites/FieldStation.html"
      - label: "Princess Seafood"
        href: "/noyo/sites/Princess.html"
      - label: "Silver"
        href: "/noyo/sites/Silver.html"

static_assets: []

# Combined infrastructure theme — steel blue
theme:
  accent: "#1a365d"
  accent-light: "#2a4a7f"
  accent-wash: "#ebf4ff"
  bg: "#f7fafc"
  bg-sidebar: "#edf2f7"
  bg-card: "#ffffff"
  bg-hover: "#e2e8f0"
  border: "#cbd5e0"
  border-light: "#e2e8f0"
  nav-btn: "rgba(42, 74, 127, 0.85)"
  nav-btn-hover: "rgba(42, 74, 127, 0.65)"
  nav-btn-active: "rgba(26, 54, 93, 0.9)"
  nav-sub-btn: "rgba(42, 74, 127, 0.5)"
  nav-sub-btn-hover: "rgba(42, 74, 127, 0.35)"
  nav-sub-btn-active: "rgba(26, 54, 93, 0.85)"
