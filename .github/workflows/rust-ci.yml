name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/watertown
  DEB_PACKAGE: ${{ github.repository }}/pond-deb
  # Pinned oras release used to push the .deb as an OCI artifact.
  ORAS_VERSION: 1.3.2
  ORAS_SHA256_AMD64: 9229ccc6d17bb282039ad4a69abb16dcb887a5bce567c075d731d9b3c7ad8eaf
  ORAS_SHA256_ARM64: 8db4a223bd6034deff198e791ea7cb3af0840df25b7e9f370e2f1f3fd20d389b

jobs:
  check:
    name: Check, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Free up disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -a -f || true
          df -h
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings
      
      - name: Run tests
        run: cargo test --workspace

  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the commit-count build number is accurate; a
          # shallow clone would report 1.
          fetch-depth: 0

      - name: Compute version
        id: v
        run: |
          set -euo pipefail
          # Version scheme: 0.<pr>.<build>. <pr> is the pull-request number,
          # taken directly on PR events or parsed from the merge/squash commit
          # subject on main. <build> is the total commit count, monotonic across
          # every build cause, so each build is strictly-newer under
          # dpkg --compare-versions and the selfmon auto-updater always upgrades.
          # A direct push without a PR ref inherits the most recent PR number in
          # history so <pr> never collapses to 0. 0. is the epoch until a
          # deliberate 1.0.0.
          BUILD=$(git rev-list --count HEAD)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR="${{ github.event.pull_request.number }}"
          else
            PR=$(git log --pretty=%s | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
            PR=${PR:-0}
          fi
          VERSION="0.${PR}.${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

  build-container:
    name: Build & Publish Container (${{ matrix.arch }})
    needs: [check, version]
    # Run on main/tags always, on PRs only with 'build-container' label
    if: |
      (success() || failure()) && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'build-container')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # Note: PRs from forks won't have write access to packages, so the push step will be skipped for them
    permissions:
      contents: read
      packages: write
      id-token: write  # For Sigstore signing
    
    outputs:
      image_id: ${{ steps.meta.outputs.image_id }}
      version: ${{ steps.meta.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0
      
      - name: Log in to Container Registry (Podman)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      
      - name: Log in to Container Registry (Cosign)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      
      - name: Extract metadata
        id: meta
        run: |
          IMAGE_ID=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION=pr-${{ github.event.pull_request.number }}
            EXTRA_TAG=""
          else
            # push to main or workflow_dispatch on main
            VERSION=latest
            EXTRA_TAG=sha-${SHORT_SHA}
          fi

          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "extra_tag=$EXTRA_TAG" >> $GITHUB_OUTPUT
          echo "semver=${{ needs.version.outputs.version }}" >> $GITHUB_OUTPUT
      
      - name: Free up disk space before build
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -a -f || true
          df -h
      
      - name: Build container image
        run: |
          podman build \
            --build-arg WATERTOWN_VERSION=${{ steps.meta.outputs.semver }} \
            -t ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }} \
            -f Dockerfile .
          # The 0.<pr>.<build> semver is an immutable, human-readable handle
          # alongside the moving version tag (latest / pr-N).
          podman tag \
            ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }} \
            ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.semver }}-${{ matrix.arch }}
          if [ -n "${{ steps.meta.outputs.extra_tag }}" ]; then
            podman tag \
              ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }} \
              ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.extra_tag }}-${{ matrix.arch }}
          fi

      - name: Push container image
        id: push
        run: |
          podman push ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
          podman push ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.semver }}-${{ matrix.arch }}
          if [ -n "${{ steps.meta.outputs.extra_tag }}" ]; then
            podman push ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.extra_tag }}-${{ matrix.arch }}
          fi
          DIGEST=$(podman inspect ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }} --format '{{.Digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign container image with Sigstore
        run: |
          cosign sign --yes ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}
          cosign sign --yes ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.semver }}-${{ matrix.arch }}
          if [ -n "${{ steps.meta.outputs.extra_tag }}" ]; then
            cosign sign --yes ${{ steps.meta.outputs.image_id }}:${{ steps.meta.outputs.extra_tag }}-${{ matrix.arch }}
          fi

  build-deb:
    name: Build & Publish Deb (${{ matrix.arch }})
    needs: [check, version]
    # Same gate as build-container: always on main/workflow_dispatch, on PRs
    # only when the 'build-container' label is present.
    if: |
      (success() || failure()) && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'build-container')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write  # For Sigstore signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install build tooling (brotli, cargo-deb, oras)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y brotli
          cargo install cargo-deb --locked
          case "${{ matrix.arch }}" in
            amd64) ORAS_SHA=${ORAS_SHA256_AMD64} ;;
            arm64) ORAS_SHA=${ORAS_SHA256_ARM64} ;;
            *) echo "unsupported arch ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          TARBALL=oras_${ORAS_VERSION}_linux_${{ matrix.arch }}.tar.gz
          curl -fsSL -o "${TARBALL}" \
            "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/${TARBALL}"
          echo "${ORAS_SHA}  ${TARBALL}" | sha256sum -c -
          mkdir -p oras-install
          tar -xzf "${TARBALL}" -C oras-install oras
          sudo install -m 0755 oras-install/oras /usr/local/bin/oras
          oras version

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Build vendor assets
        run: make vendor

      - name: Build Debian package
        env:
          # Bake the same version into the packaged binary so `pond --version`
          # matches the deb version.
          WATERTOWN_VERSION: ${{ needs.version.outputs.version }}
        run: cargo deb -p cmd --deb-version "${{ needs.version.outputs.version }}"

      - name: Extract metadata
        id: meta
        run: |
          set -euo pipefail
          PKG=${{ env.REGISTRY }}/${{ env.DEB_PACKAGE }}
          PKG=$(echo "$PKG" | tr '[A-Z]' '[a-z]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION=pr-${{ github.event.pull_request.number }}
            EXTRA_TAG=""
          else
            VERSION=latest
            EXTRA_TAG=sha-${SHORT_SHA}
          fi
          DEB=$(ls -t target/debian/watertown_*_${{ matrix.arch }}.deb | head -1)
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "extra_tag=$EXTRA_TAG" >> $GITHUB_OUTPUT
          echo "semver=${{ needs.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "deb=$DEB" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry (oras)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Log in to Container Registry (Cosign)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push Debian package as OCI artifact
        run: |
          set -euo pipefail
          PKG="${{ steps.meta.outputs.pkg }}"
          VERSION="${{ steps.meta.outputs.version }}"
          EXTRA_TAG="${{ steps.meta.outputs.extra_tag }}"
          DEB="${{ steps.meta.outputs.deb }}"
          ARCH="${{ matrix.arch }}"
          # Push from target/debian so the artifact carries the bare .deb
          # filename (the box reads its version back via dpkg-deb -f).
          ( cd "$(dirname "$DEB")" && \
            oras push "${PKG}:${VERSION}-${ARCH}" \
              "$(basename "$DEB"):application/vnd.debian.binary-package" )
          oras tag "${PKG}:${VERSION}-${ARCH}" "${{ steps.meta.outputs.semver }}-${ARCH}"
          if [ -n "${EXTRA_TAG}" ]; then
            oras tag "${PKG}:${VERSION}-${ARCH}" "${EXTRA_TAG}-${ARCH}"
          fi

      - name: Sign Debian artifact with Sigstore
        run: |
          set -euo pipefail
          PKG="${{ steps.meta.outputs.pkg }}"
          VERSION="${{ steps.meta.outputs.version }}"
          EXTRA_TAG="${{ steps.meta.outputs.extra_tag }}"
          SEMVER="${{ steps.meta.outputs.semver }}"
          ARCH="${{ matrix.arch }}"
          cosign sign --yes "${PKG}:${VERSION}-${ARCH}"
          cosign sign --yes "${PKG}:${SEMVER}-${ARCH}"
          if [ -n "${EXTRA_TAG}" ]; then
            cosign sign --yes "${PKG}:${EXTRA_TAG}-${ARCH}"
          fi

  comment-pr:
    name: Comment PR with Image Tags
    needs: build-container
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with image tags
        uses: actions/github-script@v7
        with:
          script: |
            const imageId = '${{ needs.build-container.outputs.image_id }}';
            const version = '${{ needs.build-container.outputs.version }}';
            
            const body = `🐳 **Container images built and pushed!**
            
            **AMD64:**
            \`\`\`bash
            podman pull ${imageId}:${version}-amd64
            \`\`\`
            
            **ARM64:**
            \`\`\`bash
            podman pull ${imageId}:${version}-arm64
            \`\`\`
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  release:
    name: GitHub Release
    needs: [version, build-container, build-deb]
    # One release per build on main; skipped on PRs and forks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release ${TAG} already exists; nothing to do"
            exit 0
          fi
          # Tag the exact built commit and let GitHub generate notes from the
          # merged pull requests since the previous release.
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes
